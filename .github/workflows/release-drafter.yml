name: Release Drafter

on:
  push:
    branches:
      - "main"
  # allowing to run manually
  workflow_dispatch:

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      # Required to create/update the release
      contents: write
      # Required for autolabeler to add labels to PRs
      pull-requests: write

    steps:
      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        # Uses local .github/release-drafter.yml with version-resolver
        # entries for semver bumping based on PR labels.
